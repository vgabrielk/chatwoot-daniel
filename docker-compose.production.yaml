version: '3'

x-base: &base
  image: chatwoot/chatwoot:latest
  environment:
    NODE_ENV: ${NODE_ENV:-production}
    RAILS_ENV: ${RAILS_ENV:-production}
    INSTALLATION_ENV: ${INSTALLATION_ENV:-docker}
    SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    FRONTEND_URL: ${FRONTEND_URL}
    POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
    POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DATABASE: ${POSTGRES_DATABASE:-chatwoot}
    REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
  volumes:
    - chatwoot_novo_storage:/app/storage

services:
  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
    entrypoint: docker/entrypoints/rails.sh
    expose:
      - "3000"
    ports:
      - "3000"
    command:
      - sh
      - -c
      - |
        bundle exec rails db:chatwoot_prepare &&
        bundle exec rails s -p 3000 -b 0.0.0.0
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget --spider -q http://localhost:3000 || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - chatwoot_novo_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-chatwoot}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - chatwoot_novo_redis:/data

volumes:
  chatwoot_novo_storage:
  chatwoot_novo_postgres:
  chatwoot_novo_redis:
